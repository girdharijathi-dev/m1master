<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>M1 Master</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--card:#12121a;--border:#1e1e2e;--gold:#f5c842;--gold2:#e8a020;--red:#ff4444;--green:#22c55e;--blue:#3b82f6;--text:#e8e8f0;--muted:#6b6b80}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;min-height:100vh;padding-bottom:80px}
.header{background:linear-gradient(135deg,#1a1a2e,#16213e);border-bottom:2px solid var(--gold);padding:14px 16px;text-align:center;position:sticky;top:0;z-index:100}
.header h1{font-size:22px;color:var(--gold);letter-spacing:3px;font-weight:800}
.header p{font-size:11px;color:var(--muted);margin-top:2px}
.status-bar{background:var(--card);border:1px solid var(--border);margin:12px;border-radius:10px;padding:10px 14px;font-size:12px}
.status-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.status-row:last-child{margin-bottom:0}
.badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;background:var(--green);color:#000}
.badge.blue{background:var(--blue);color:#fff}
.badge.red{background:var(--red);color:#fff}
.tabs{display:flex;background:var(--card);border-bottom:1px solid var(--border);overflow-x:auto;position:sticky;top:70px;z-index:99}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:1;min-width:70px;padding:12px 8px;text-align:center;font-size:11px;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap}
.tab.active{color:var(--gold);border-bottom-color:var(--gold);background:rgba(245,200,66,.05)}
.tab-icon{font-size:16px;display:block;margin-bottom:2px}
.section{display:none;padding:12px}
.section.active{display:block}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px}
.card-title{font-size:13px;font-weight:700;color:var(--gold);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.form-group{margin-bottom:12px}
.form-label{font-size:11px;color:var(--muted);margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:1px}
.form-input{width:100%;background:#0a0a0f;border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:8px;font-size:16px;outline:none;transition:border-color .2s}
.form-input:focus{border-color:var(--gold)}
.btn{width:100%;padding:12px;border-radius:8px;border:none;font-size:14px;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:8px}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#000}
.btn-red{background:var(--red);color:#fff}
.btn-green{background:var(--green);color:#000}
.btn-blue{background:var(--blue);color:#fff}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.5}
.period-btns{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.period-btn{padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:11px;cursor:pointer;transition:all .2s}
.period-btn.active{background:var(--gold);color:#000;border-color:var(--gold);font-weight:700}
.data-table{width:100%;border-collapse:collapse;font-size:12px}
.data-table th{background:rgba(245,200,66,.1);color:var(--gold);padding:8px 4px;text-align:center;font-size:10px;letter-spacing:1px;border-bottom:1px solid var(--border)}
.data-table td{padding:7px 4px;text-align:center;border-bottom:1px solid rgba(30,30,46,.5);font-size:12px}
.data-table tr:hover td{background:rgba(245,200,66,.03)}
.holiday-row td{color:var(--red)}
.result-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.result-box{background:#0a0a0f;border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center}
.result-label{font-size:10px;color:var(--muted);margin-bottom:4px}
.result-value{font-size:20px;font-weight:800;color:var(--gold)}
.predict-display{background:linear-gradient(135deg,#1a1a2e,#0f3460);border:2px solid var(--gold);border-radius:12px;padding:20px;text-align:center;margin-bottom:12px}
.predict-title{font-size:11px;color:var(--muted);margin-bottom:8px;letter-spacing:2px}
.predict-nums{font-size:36px;font-weight:900;color:var(--gold);letter-spacing:8px}
.predict-jodi{font-size:28px;font-weight:800;color:var(--gold2);margin-top:4px}
.analysis-stat{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
.stat-box{background:#0a0a0f;border:1px solid var(--border);border-radius:8px;padding:10px 6px;text-align:center}
.stat-num{font-size:20px;font-weight:800;color:var(--gold)}
.stat-lbl{font-size:9px;color:var(--muted);margin-top:2px}
.num-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.chip{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
.chip.hot{background:var(--red);color:#fff}
.chip.cold{background:var(--blue);color:#fff}
.chip.neutral{background:var(--border);color:var(--text)}
.loading{text-align:center;padding:30px;color:var(--muted);font-size:13px}
.spinner{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--card);border:1px solid var(--gold);color:var(--text);padding:10px 20px;border-radius:8px;font-size:13px;z-index:999;display:none;white-space:nowrap}
.toast.show{display:block;animation:fadeInOut 2.5s ease}
@keyframes fadeInOut{0%{opacity:0;transform:translateX(-50%) translateY(10px)}15%{opacity:1;transform:translateX(-50%) translateY(0)}75%{opacity:1}100%{opacity:0}}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);display:flex;z-index:100}
.nav-item{flex:1;padding:10px 4px;text-align:center;cursor:pointer;color:var(--muted);font-size:9px;transition:color .2s}
.nav-item.active{color:var(--gold)}
.nav-item .nav-icon{font-size:20px;display:block;margin-bottom:2px}
.divider{height:1px;background:var(--border);margin:12px 0}
.text-muted{color:var(--muted);font-size:12px}
.highlight{color:var(--gold);font-weight:700}
.text-red{color:var(--red)}
.text-green{color:var(--green)}
.panel-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;margin:8px 0}
.panel-box{background:#0a0a0f;border:1px solid var(--border);border-radius:6px;padding:6px 2px;text-align:center;font-size:10px}
.panel-num{font-size:16px;font-weight:800;color:var(--gold)}
.panel-cnt{font-size:9px;color:var(--muted)}
.section-title{font-size:11px;color:var(--muted);margin:12px 0 6px;text-transform:uppercase;letter-spacing:1px}
.tag{display:inline-block;padding:3px 8px;border-radius:4px;font-size:10px;font-weight:700;margin:2px}
.tag-red{background:rgba(255,68,68,.2);color:var(--red);border:1px solid var(--red)}
.tag-blue{background:rgba(59,130,246,.2);color:var(--blue);border:1px solid var(--blue)}
.tag-gold{background:rgba(245,200,66,.2);color:var(--gold);border:1px solid var(--gold)}
</style>
</head>
<body>

<div class="header">
  <h1>⚡ M1 MASTER</h1>
  <p>Production Analysis Engine</p>
</div>

<div class="status-bar">
  <div class="status-row">
    <span>💾 GitHub Storage</span>
    <span id="githubStatus" class="badge blue">Loading...</span>
  </div>
  <div class="status-row">
    <span>📊 Total Records</span>
    <span class="highlight" id="totalRecords">--</span>
  </div>
  <div class="status-row">
    <span>📅 Last Entry</span>
    <span class="highlight" id="lastEntry">--</span>
  </div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('predict')"><span class="tab-icon">🔮</span>Predict</div>
  <div class="tab" onclick="switchTab('entry')"><span class="tab-icon">➕</span>Entry</div>
  <div class="tab" onclick="switchTab('analysis')"><span class="tab-icon">📊</span>Analysis</div>
  <div class="tab" onclick="switchTab('history')"><span class="tab-icon">📋</span>History</div>
</div>

<!-- PREDICT -->
<div id="predict" class="section active">
  <div class="card">
    <div class="card-title">⚡ Next Day Prediction</div>
    <div class="period-btns" id="predictPeriod">
      <button class="period-btn active" onclick="setPredictPeriod(7,this)">7 दिन</button>
      <button class="period-btn" onclick="setPredictPeriod(15,this)">15 दिन</button>
      <button class="period-btn" onclick="setPredictPeriod(45,this)">45 दिन</button>
      <button class="period-btn" onclick="setPredictPeriod(90,this)">3 माह</button>
      <button class="period-btn" onclick="setPredictPeriod(180,this)">6 माह</button>
      <button class="period-btn" onclick="setPredictPeriod(365,this)">1 साल</button>
    </div>
    <button class="btn btn-gold" onclick="runPredict()">🚀 Master Analysis चलाएं</button>
    <div id="predictResult"></div>
  </div>
</div>

<!-- ENTRY -->
<div id="entry" class="section">
  <div class="card">
    <div class="card-title">📅 नया Data डालें</div>
    <div class="form-group">
      <label class="form-label">📅 तारीख</label>
      <input type="date" id="entryDate" class="form-input">
    </div>
    <div class="form-group">
      <label class="form-label">🌅 Open पन्ना (3 अंक)</label>
      <input type="text" id="entryOpenPanel" class="form-input" placeholder="जैसे: 267" maxlength="3">
    </div>
    <div class="form-group">
      <label class="form-label">🎯 Jodi (2 अंक)</label>
      <input type="text" id="entryJodi" class="form-input" placeholder="00-99" maxlength="2">
    </div>
    <div class="form-group">
      <label class="form-label">🌙 Close पन्ना (3 अंक)</label>
      <input type="text" id="entryClosePanel" class="form-input" placeholder="जैसे: 349" maxlength="3">
    </div>
    <button class="btn btn-gold" onclick="saveEntry()">💾 GitHub पर Save करें</button>
    <button class="btn btn-red" onclick="saveHoliday()">🔴 Holiday / अवकाश</button>
  </div>
  <div class="card">
    <div class="card-title">📦 Data Status</div>
    <div id="dataStatus" class="text-muted">Loading...</div>
    <div class="divider"></div>
    <button class="btn btn-outline" onclick="syncData()">🔄 GitHub से Sync करें</button>
  </div>
</div>

<!-- ANALYSIS -->
<div id="analysis" class="section">
  <div class="card">
    <div class="card-title">🔬 Deep Analysis</div>
    <div class="period-btns" id="analysisPeriod">
      <button class="period-btn active" onclick="setAnalysisPeriod(7,this)">7 दिन</button>
      <button class="period-btn" onclick="setAnalysisPeriod(15,this)">15 दिन</button>
      <button class="period-btn" onclick="setAnalysisPeriod(45,this)">45 दिन</button>
      <button class="period-btn" onclick="setAnalysisPeriod(90,this)">3 माह</button>
      <button class="period-btn" onclick="setAnalysisPeriod(180,this)">6 माह</button>
      <button class="period-btn" onclick="setAnalysisPeriod(365,this)">1 साल</button>
    </div>
    <button class="btn btn-gold" onclick="runAnalysis()">📊 Deep Analysis करें</button>
    <div id="analysisResult"></div>
  </div>
</div>

<!-- HISTORY -->
<div id="history" class="section">
  <div class="card">
    <div class="card-title">📋 Data History</div>
    <div style="display:flex;gap:6px;margin-bottom:12px">
      <input type="text" id="searchDate" class="form-input" placeholder="Search तारीख या Jodi..." style="flex:1;font-size:13px">
      <button class="btn btn-outline" onclick="searchHistory()" style="width:auto;padding:10px 12px;margin:0">🔍</button>
    </div>
    <div id="historyTable"><div class="loading"><div class="spinner"></div>Loading...</div></div>
  </div>
</div>

<div class="bottom-nav">
  <div class="nav-item active" onclick="switchTab('predict')"><span class="nav-icon">🔮</span>Predict</div>
  <div class="nav-item" onclick="switchTab('entry')"><span class="nav-icon">➕</span>Entry</div>
  <div class="nav-item" onclick="switchTab('analysis')"><span class="nav-icon">📊</span>Analysis</div>
  <div class="nav-item" onclick="switchTab('history')"><span class="nav-icon">📋</span>History</div>
</div>

<div class="toast" id="toast"></div>

let allData = [];

// ============================================================
// GITHUB API
// ============================================================
async function githubGet() {
  try {
    const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${DATA_FILE}`, {
      headers: {'Authorization': `token ${GITHUB_TOKEN}`, 'Accept': 'application/vnd.github.v3+json'}
    });
    if (res.status === 404) return null;
    const json = await res.json();
    fileSHA = json.sha;
    const decoded = decodeURIComponent(escape(atob(json.content.replace(/\n/g,''))));
    return JSON.parse(decoded);
  } catch(e) { return null; }
}

async function githubSave(data) {
  try {
    const str = JSON.stringify(data);
    const content = btoa(unescape(encodeURIComponent(str)));
    const body = {message: `M1 update ${new Date().toISOString().slice(0,10)}`, content};
    if (fileSHA) body.sha = fileSHA;
    const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/${DATA_FILE}`, {
      method: 'PUT',
      headers: {'Authorization': `token ${GITHUB_TOKEN}`, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json'},
      body: JSON.stringify(body)
    });
    const json = await res.json();
    if (json.content) fileSHA = json.content.sha;
    return res.ok;
  } catch(e) { return false; }
}

    document.getElementById('githubStatus').textContent = '⬆️ Uploading...';
    showToast('⬆️ Base data GitHub पर upload हो रहा है...');

      document.getElementById('githubStatus').textContent = '✅ GitHub';

}

// ============================================================
// SAVE ENTRY
// ============================================================
function panelSum(p) {
  if(!p||p.length!==3) return null;
  return p.split('').reduce((s,d)=>s+parseInt(d),0)%10;
}

async function saveEntry() {
  const date = document.getElementById('entryDate').value;
  const openPanel = document.getElementById('entryOpenPanel').value.trim();
  const jodi = document.getElementById('entryJodi').value.trim().padStart(2,'0');
  const closePanel = document.getElementById('entryClosePanel').value.trim();

  if (!date) { showToast('❌ तारीख डालें!'); return; }
  if (openPanel.length!==3 || closePanel.length!==3) { showToast('❌ पन्ना 3 अंक का होना चाहिए!'); return; }
  if (jodi.length!==2) { showToast('❌ Jodi 2 अंक की होनी चाहिए!'); return; }

  const openD = panelSum(openPanel);
  const closeD = panelSum(closePanel);

  const entry = {date, open:openD, jodi, close:closeD, open_panel:openPanel, close_panel:closePanel, holiday:false};
  const idx = allData.findIndex(d=>d.date===date);
  if (idx>=0) allData[idx]=entry; else { allData.push(entry); allData.sort((a,b)=>a.date.localeCompare(b.date)); }

  showToast('💾 GitHub पर Save हो रहा है...');
  const ok = await githubSave(allData);
  if (ok) {
    showToast('✅ GitHub पर Permanent Save हो गया!');
    updateStatusBar(); updateDataStatus(); loadHistory();
    document.getElementById('entryOpenPanel').value='';
    document.getElementById('entryJodi').value='';
    document.getElementById('entryClosePanel').value='';
  } else {
    showToast('❌ GitHub save नहीं हुआ!');
  }
}

async function saveHoliday() {
  const date = document.getElementById('entryDate').value;
  if (!date) { showToast('❌ तारीख डालें!'); return; }
  const entry = {date, holiday:true};
  const idx = allData.findIndex(d=>d.date===date);
  if (idx>=0) allData[idx]=entry; else { allData.push(entry); allData.sort((a,b)=>a.date.localeCompare(b.date)); }
  showToast('💾 Save हो रहा है...');
  const ok = await githubSave(allData);
  if (ok) { showToast('✅ Holiday Save हो गया!'); updateStatusBar(); loadHistory(); }
}

async function syncData() {
  showToast('🔄 GitHub से Sync हो रहा है...');
  const d = await githubGet();
  if (d) { allData=d; updateStatusBar(); updateDataStatus(); loadHistory(); showToast('✅ Sync हो गया!'); }
  else showToast('❌ Sync नहीं हुआ');
}

// ============================================================
function loadHistory(filter='') {
  let sorted = [...allData].sort((a,b)=>b.date.localeCompare(a.date));
  if (filter) sorted = sorted.filter(d=>d.date.includes(filter)||(d.jodi&&d.jodi.includes(filter)));
  if (!sorted.length) { document.getElementById('historyTable').innerHTML='<div class="loading">कोई data नहीं मिला।</div>'; return; }
  const show = sorted.slice(0,200);
  let html=`<div style="font-size:11px;color:var(--muted);margin-bottom:8px">दिखा रहे हैं: ${show.length} / ${sorted.length} records</div>
  <table class="data-table">
  <tr><th>तारीख</th><th>Open</th><th>Jodi</th><th>Close</th><th>O-Panel</th><th>C-Panel</th></tr>`;
  show.forEach(d=>{
    if(d.holiday) html+=`<tr class="holiday-row"><td>${d.date}</td><td colspan="5">🔴 Holiday</td></tr>`;
    else html+=`<tr><td>${d.date}</td><td>${d.open}</td><td><b>${d.jodi}</b></td><td>${d.close}</td><td>${d.open_panel||'-'}</td><td>${d.close_panel||'-'}</td></tr>`;
  });
  html+='</table>';
  document.getElementById('historyTable').innerHTML=html;
}

function searchHistory() {
  loadHistory(document.getElementById('searchDate').value.trim());
}

function setPredictPeriod(d,btn) {
  predictDays=d;
  document.querySelectorAll('#predictPeriod .period-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function runPredict() {
  const real = allData.filter(d=>!d.holiday).sort((a,b)=>a.date.localeCompare(b.date));
  if (real.length<5) { document.getElementById('predictResult').innerHTML='<div class="loading">कम से कम 5 दिन का data चाहिए।</div>'; return; }
  const recent = real.slice(-predictDays);

  // Frequency analysis
  const openFreq={}, closeFreq={}, jodiFreq={}, panelFreq={};
  for(let i=0;i<10;i++){openFreq[i]=0;closeFreq[i]=0;}

  recent.forEach(d=>{
    openFreq[d.open]=(openFreq[d.open]||0)+1;
    closeFreq[d.close]=(closeFreq[d.close]||0)+1;
    jodiFreq[d.jodi]=(jodiFreq[d.jodi]||0)+1;
    if(d.open_panel) panelFreq[d.open_panel]=(panelFreq[d.open_panel]||0)+1;
    if(d.close_panel) panelFreq[d.close_panel]=(panelFreq[d.close_panel]||0)+1;
  });

  const topOpen=Object.entries(openFreq).sort((a,b)=>b[1]-a[1]);
  const topClose=Object.entries(closeFreq).sort((a,b)=>b[1]-a[1]);
  const topJodi=Object.entries(jodiFreq).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const topPanel=Object.entries(panelFreq).sort((a,b)=>b[1]-a[1]).slice(0,6);

  // Cycle Analysis - what came after similar sequences
  const lastJodi = recent[recent.length-1]?.jodi;
  const prevOccurrences = [];
  for(let i=0;i<real.length-1;i++){
    if(real[i].jodi===lastJodi && real[i+1]) {
      prevOccurrences.push(real[i+1].jodi);
    }
  }

  const nextJodiFreq={};
  prevOccurrences.forEach(j=>{nextJodiFreq[j]=(nextJodiFreq[j]||0)+1});
  const cycleJodis=Object.entries(nextJodiFreq).sort((a,b)=>b[1]-a[1]).slice(0,5);

  document.getElementById('predictResult').innerHTML=`
  <div class="divider"></div>
  <div class="predict-display">
    <div class="predict-title">🎯 PREDICTED OPEN → CLOSE</div>
    <div class="predict-nums">${topOpen[0][0]} → ${topClose[0][0]}</div>
    <div class="predict-jodi" style="margin-top:8px">TOP JODI: ${topJodi[0]?.[0]||'--'}</div>
  </div>
  <div class="result-grid">
    <div class="result-box"><div class="result-label">🔥 Hot Open</div><div class="result-value">${topOpen.slice(0,3).map(x=>x[0]).join(', ')}</div></div>
    <div class="result-box"><div class="result-label">🔥 Hot Close</div><div class="result-value">${topClose.slice(0,3).map(x=>x[0]).join(', ')}</div></div>
  </div>
  <div class="card" style="margin-bottom:12px">
    <div class="card-title" style="font-size:12px">🎯 Top Jodis (${recent.length} दिन)</div>
    <div class="num-chips">
      ${topJodi.slice(0,8).map(([j,c],i)=>`<span class="chip ${i<2?'hot':i<5?'neutral':'cold'}" title="${c} बार">${j}</span>`).join('')}
    </div>
    <div style="font-size:10px;color:var(--muted);margin-top:8px">${topJodi.slice(0,5).map(([j,c])=>`${j}(${c})`).join(' | ')}</div>
  </div>
  ${cycleJodis.length?`<div class="card" style="margin-bottom:12px">
    <div class="card-title" style="font-size:12px">🔄 Cycle Analysis (${lastJodi} के बाद आई)</div>
    <div class="num-chips">${cycleJodis.map(([j,c])=>`<span class="chip hot" title="${c} बार">${j}</span>`).join('')}</div>
  </div>`:''}
  <div class="card" style="margin-bottom:0">
    <div class="card-title" style="font-size:12px">📋 Top Panels</div>
    <div class="num-chips">${topPanel.map(([p,c])=>`<span class="tag tag-gold">${p}(${c})</span>`).join('')}</div>
  </div>
  <div style="font-size:11px;color:var(--muted);text-align:center;margin-top:8px">Last ${recent.length} days analysis</div>`;
}

// ============================================================
// ANALYSIS
// ============================================================
function setAnalysisPeriod(d,btn) {
  analysisDays=d;
  document.querySelectorAll('#analysisPeriod .period-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}

function runAnalysis() {
  const real = allData.filter(d=>!d.holiday).sort((a,b)=>a.date.localeCompare(b.date));
  if (real.length<5) { document.getElementById('analysisResult').innerHTML='<div class="loading">कम से कम 5 दिन का data चाहिए।</div>'; return; }
  const recent = real.slice(-analysisDays);

  // Number frequency
  const numFreq={};
  for(let i=0;i<10;i++) numFreq[i]=0;
  recent.forEach(d=>{numFreq[d.open]++;numFreq[d.close]++;});
  const sortedNums=Object.entries(numFreq).sort((a,b)=>b[1]-a[1]);
  const hot=sortedNums.slice(0,3).map(x=>x[0]);
  const cold=sortedNums.slice(-3).map(x=>x[0]);

  // Jodi analysis
  const jodiFreq={};
  recent.forEach(d=>{jodiFreq[d.jodi]=(jodiFreq[d.jodi]||0)+1;});
  const topJodis=Object.entries(jodiFreq).sort((a,b)=>b[1]-a[1]).slice(0,10);

  // Panel analysis
  const panelFreq={};
  recent.forEach(d=>{
    if(d.open_panel) panelFreq[d.open_panel]=(panelFreq[d.open_panel]||0)+1;
    if(d.close_panel) panelFreq[d.close_panel]=(panelFreq[d.close_panel]||0)+1;
  });
  const topPanels=Object.entries(panelFreq).sort((a,b)=>b[1]-a[1]).slice(0,10);

  // Open-Close cross match
  const crossFreq={};
  recent.forEach(d=>{
    const key=`${d.open}-${d.close}`;
    crossFreq[key]=(crossFreq[key]||0)+1;
  });
  const topCross=Object.entries(crossFreq).sort((a,b)=>b[1]-a[1]).slice(0,5);

  // Gap analysis - which jodis haven't come recently
  const allJodis=new Set(real.map(d=>d.jodi));
  const recentJodis=new Set(recent.map(d=>d.jodi));
  const missingJodis=[...allJodis].filter(j=>!recentJodis.has(j)).slice(0,8);

  document.getElementById('analysisResult').innerHTML=`
  <div class="divider"></div>
  <div class="analysis-stat">
    <div class="stat-box"><div class="stat-num">${recent.length}</div><div class="stat-lbl">दिन</div></div>
    <div class="stat-box"><div class="stat-num">${hot[0]}</div><div class="stat-lbl">Hot #</div></div>
    <div class="stat-box"><div class="stat-num">${cold[0]}</div><div class="stat-lbl">Cold #</div></div>
  </div>

  <div class="card" style="margin-bottom:12px">
    <div class="card-title" style="font-size:12px">🔥 Hot Numbers (ज़्यादा आए)</div>
    <div class="num-chips">${hot.map(n=>`<span class="chip hot">${n}</span>`).join('')}</div>
    <div style="font-size:10px;color:var(--muted);margin-top:6px">${sortedNums.slice(0,5).map(([n,c])=>`${n}:${c}बार`).join(' | ')}</div>
  </div>

  <div class="card" style="margin-bottom:12px">
    <div class="card-title" style="font-size:12px">❄️ Cold Numbers (कम आए)</div>
    <div class="num-chips">${cold.map(n=>`<span class="chip cold">${n}</span>`).join('')}</div>
    <div style="font-size:10px;color:var(--muted);margin-top:6px">${sortedNums.slice(-5).map(([n,c])=>`${n}:${c}बार`).join(' | ')}</div>
  </div>

  <div class="card" style="margin-bottom:12px">
    <div class="card-title" style="font-size:12px">🎯 Top Jodis</div>
    <div class="num-chips">${topJodis.slice(0,8).map(([j,c],i)=>`<span class="chip ${i<2?'hot':i<5?'neutral':'cold'}">${j}</span>`).join('')}</div>
    <div style="font-size:10px;color:var(--muted);margin-top:6px">${topJodis.slice(0,5).map(([j,c])=>`${j}(${c})`).join(' | ')}</div>
  </div>

  <div class="card" style="margin-bottom:12px">
    <div class="card-title" style="font-size:12px">🔀 Open-Close Cross Match</div>
    <div class="num-chips">${topCross.map(([k,c])=>`<span class="tag tag-gold">${k}→${c}बार</span>`).join('')}</div>
  </div>

  <div class="card" style="margin-bottom:12px">
    <div class="card-title" style="font-size:12px">📋 Top Panels</div>
    <div class="num-chips">${topPanels.slice(0,8).map(([p,c])=>`<span class="tag tag-blue">${p}(${c})</span>`).join('')}</div>
  </div>

  ${missingJodis.length?`<div class="card" style="margin-bottom:0">
    <div class="card-title" style="font-size:12px">⏳ Due Jodis (${analysisDays}दिन में नहीं आईं)</div>
    <div class="num-chips">${missingJodis.map(j=>`<span class="tag tag-red">${j}</span>`).join('')}</div>
  </div>`:''}`;
}

// ============================================================
// UI
// ============================================================
function switchTab(tab) {
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
  const tabs=['predict','entry','analysis','history'];
  const idx=tabs.indexOf(tab);
  document.querySelectorAll('.tab')[idx]?.classList.add('active');
  document.querySelectorAll('.nav-item')[idx]?.classList.add('active');
}

function showToast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast show';
  setTimeout(()=>t.className='toast',2500);
}

// START
init();
</script>
</body>
</html>
